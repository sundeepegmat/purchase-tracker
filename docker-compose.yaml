services:
  purchase-tracker:
    build: .
    ports:
      - "5000"
    extra_hosts:
      - "srv1079050.hstgr.cloud:host-gateway"
    environment:
      - EGMAT_API_URL=${EGMAT_API_URL}
      - EGMAT_API_KEY=${EGMAT_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DB_PATH=${DB_PATH:-/app/data/purchase_tracker.db}
      - REFRESH_INTERVAL_MINUTES=${REFRESH_INTERVAL_MINUTES:-30}
    volumes:
      - purchase-tracker-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.purchase-tracker-http.rule=Host(`srv1079050.hstgr.cloud`) && PathPrefix(`/apps/purchase-tracker`)"
      - "traefik.http.routers.purchase-tracker-http.entryPoints=http"
      - "traefik.http.routers.purchase-tracker-http.middlewares=purchase-tracker-strip,gzip"
      - "traefik.http.routers.purchase-tracker-https.rule=Host(`srv1079050.hstgr.cloud`) && PathPrefix(`/apps/purchase-tracker`)"
      - "traefik.http.routers.purchase-tracker-https.entryPoints=https"
      - "traefik.http.routers.purchase-tracker-https.tls=true"
      - "traefik.http.routers.purchase-tracker-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.purchase-tracker-https.middlewares=purchase-tracker-strip,gzip"
      - "traefik.http.middlewares.purchase-tracker-strip.stripprefix.prefixes=/apps/purchase-tracker"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.services.purchase-tracker.loadbalancer.server.port=5000"

volumes:
  purchase-tracker-data:
